---
- name: Remove legacy/insecure packages
  ansible.builtin.apt:
    name: "{{ mylab_remove_packages }}"
    state: absent
    purge: true
    update_cache: true

- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ mylab_default_packages + mylab_default_packages_extra }}"
    state: present
    update_cache: true

- name: Install qemu guest agent
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
    update_cache: true

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Enable qemu guest agent
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true
  when: "'qemu-guest-agent.service' in ansible_facts.services"