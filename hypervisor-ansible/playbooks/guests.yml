---
- name: Build dynamic guests inventory from hypervisor-vms.yaml
  hosts: hypervisors
  gather_facts: false
  become: false
  tasks:
    - name: Load VM definitions
      ansible.builtin.include_vars:
        file: "{{ mylab_ipam_vm_file }}"
        name: mylab_ipam

    - name: Add guests dynamically
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: guests
        ansible_host: >-
          {{
            (
              item.networks
              | selectattr('bridge', 'equalto', 'br-mgmt')
              | map(attribute='ip')
              | list
              | first
              | default((item.networks | first).ip)
            )
            | regex_replace('/.*$', '')
          }}
        ansible_user: "{{ mylab_guest_ansible_user | default(mylab_default_username) }}"
        ansible_ssh_private_key_file: "{{ mylab_guest_ansible_private_key_file | default(omit) }}"
        ansible_ssh_common_args: "{{ mylab_guest_ssh_common_args }}"
      loop: "{{ mylab_ipam.vms }}"
      loop_control:
        label: "{{ item.name }}"

- name: Harden guest VMs
  hosts: guests
  become: true
  gather_facts: true
  pre_tasks:
    - name: Wait for SSH on guests
      ansible.builtin.wait_for_connection:
        timeout: 300
        sleep: 5

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Wait for dpkg/apt locks to clear
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
              fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
              fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
          sleep 3
        done
      args:
        executable: /bin/bash
      changed_when: false

  roles:
    - common
    - base_packages
    - users
    - sshd
    - journald
    - timesync
    - unattended_upgrades
    - sysctl
    - nftables