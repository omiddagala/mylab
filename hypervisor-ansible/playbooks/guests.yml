---
- name: Build dynamic guests inventory from hypervisor-vms.yaml
  hosts: hypervisors
  gather_facts: false
  become: false

  tasks:
    - name: Load VM definitions
      ansible.builtin.include_vars:
        file: "{{ mylab_ipam_vm_file }}"
        name: mylab_ipam

    - name: Add guests dynamically
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: guests
        ansible_host: >-
          {{
            (
              item.networks
              | selectattr('bridge', 'equalto', 'br-mgmt')
              | map(attribute='ip')
              | list
              | first
              | default((item.networks | first).ip)
            )
            | regex_replace('/.*$', '')
          }}
        ansible_user: "{{ mylab_guest_ansible_user | default(mylab_default_username) }}"
        ansible_ssh_private_key_file: "{{ mylab_guest_ansible_private_key_file | default(lookup('env', 'HOME') ~ '/.ssh/jmachine') }}"
        ansible_ssh_common_args: "{{ mylab_guest_ssh_common_args | default('-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null') }}"
      loop: "{{ mylab_ipam.vms }}"
      loop_control:
        label: "{{ item.name }}"

- name: Wait until guests are reachable
  hosts: guests
  become: false
  gather_facts: false

  tasks:
    - name: Wait for SSH on guests
      ansible.builtin.wait_for_connection:
        timeout: 600
        sleep: 5

