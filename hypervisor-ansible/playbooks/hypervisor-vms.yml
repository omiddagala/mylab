---
- name: Render and manage mylab VMs
  hosts: hypervisors
  become: true

  pre_tasks:
    - name: Assert generated VM file exists
      ansible.builtin.stat:
        path: "{{ mylab_ipam_vm_file }}"
      register: mylab_ipam_vm_file_stat

    - name: Fail if generated VM file is missing
      ansible.builtin.assert:
        that:
          - mylab_ipam_vm_file_stat.stat.exists
        fail_msg: "Missing {{ mylab_ipam_vm_file }}"

  roles:
    - role: qemu_vm