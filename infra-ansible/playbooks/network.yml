- name: Wait for package manager readiness
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait briefly for cloud-init to settle if present
      ansible.builtin.shell: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        else
          exit 0
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Stop apt-daily services if running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - apt-daily.service
        - apt-daily-upgrade.service
      failed_when: false
      changed_when: false

    - name: Wait until apt/dpkg locks are released
      ansible.builtin.shell: |
        timeout=900
        interval=5
        elapsed=0
        while [ "$elapsed" -lt "$timeout" ]; do
          if ! sudo fuser /var/lib/dpkg/lock >/dev/null 2>&1 \
             && ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
             && ! sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1; then
            exit 0
          fi
          sleep "$interval"
          elapsed=$((elapsed + interval))
        done
        exit 1
      args:
        executable: /bin/bash
      changed_when: false