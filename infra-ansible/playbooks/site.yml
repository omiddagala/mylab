---
- name: Bootstrap all Linux nodes
  hosts: linux
  gather_facts: true
  become: true
  roles:
    - common_base
    - apt_baseline
    - users_admin
    - ssh_hardening
    - time_sync
    - journald
    - sysctl_tuning

- name: Configure bastion
  hosts: bastion
  gather_facts: true
  become: true
  roles:
    - bastion_base

- name: Configure routers first
  hosts: routers
  gather_facts: true
  become: true
  roles:
    - keepalived_vrrp
    - router_frr
    - router_nat

- name: Configure leafs after routers
  hosts: leafs
  gather_facts: true
  become: true
  roles:
    - leaf_l3

- name: Install firewall and exporter after routing exists
  hosts: linux
  gather_facts: true
  become: true
  roles:
    - nftables_base
    - node_exporter

- name: Prepare kubernetes nodes
  hosts: kubernetes
  gather_facts: true
  become: true
  roles:
    - containerd
    - kubernetes_common