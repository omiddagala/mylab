all:
  vars:
    ansible_user: ansible
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3
  children:
    dc1:
      hosts:
        bastion1.dc1.lab:
        r1-dc1.lab:
        r2-dc1.lab:
        leaf1-dc1.lab:
        leaf2-dc1.lab:
        prod1-cp1.dc1.lab:
        prod1-w1.dc1.lab:
        prod1-w2.dc1.lab:
    dc2:
      hosts:
        r1-dc2.lab:
        r2-dc2.lab:
        leaf1-dc2.lab:
        leaf2-dc2.lab:
        prod2-cp1.dc2.lab:
        prod2-w1.dc2.lab:
        prod2-w2.dc2.lab:
    bastion:
      hosts:
        bastion1.dc1.lab:
    routers:
      hosts:
        r1-dc1.lab:
        r2-dc1.lab:
        r1-dc2.lab:
        r2-dc2.lab:
    leafs:
      hosts:
        leaf1-dc1.lab:
        leaf2-dc1.lab:
        leaf1-dc2.lab:
        leaf2-dc2.lab:
    k8s_control_plane:
      hosts:
        prod1-cp1.dc1.lab:
        prod2-cp1.dc2.lab:
    k8s_workers:
      hosts:
        prod1-w1.dc1.lab:
        prod1-w2.dc1.lab:
        prod2-w1.dc2.lab:
        prod2-w2.dc2.lab:
    k8s_cluster:
      children:
        k8s_control_plane:
        k8s_workers:
