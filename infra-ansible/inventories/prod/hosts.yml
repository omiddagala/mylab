---
all:
  vars:
    ansible_user: debian
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

  children:
    linux:
      hosts:
        bastion1.dc1.lab:
          ansible_host: 192.168.50.10

        r1-dc1.lab:
          ansible_host: 192.168.50.1
          router_dc: dc1
          router_id: 10.255.0.1
          mgmt_ip: 192.168.50.1
          infra_ip: 10.10.50.1
          wan_ip: 172.16.255.11
          vrrp_priority_mgmt: 200
          vrrp_priority_infra: 200
          nat_inside_interfaces: ["eth0", "eth1"]
          nat_outside_interface: eth2

        r2-dc1.lab:
          ansible_host: 192.168.50.2
          router_dc: dc1
          router_id: 10.255.0.2
          mgmt_ip: 192.168.50.2
          infra_ip: 10.10.50.2
          wan_ip: 172.16.255.12
          vrrp_priority_mgmt: 100
          vrrp_priority_infra: 100
          nat_inside_interfaces: ["eth0", "eth1"]
          nat_outside_interface: eth2

        leaf1-dc1.lab:
          ansible_host: 192.168.50.11
          leaf_dc: dc1
          leaf_router_vip: 10.10.50.254

        leaf2-dc1.lab:
          ansible_host: 192.168.50.12
          leaf_dc: dc1
          leaf_router_vip: 10.10.50.254

        r1-dc2.lab:
