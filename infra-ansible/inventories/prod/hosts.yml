        prod1-w2.dc1.lab:
          ansible_host: 192.168.50.32

        prod2-cp1.dc2.lab:
          ansible_host: 192.168.50.61

        prod2-w1.dc2.lab:
          ansible_host: 192.168.50.71

        prod2-w2.dc2.lab:
          ansible_host: 192.168.50.72

    bastion:
