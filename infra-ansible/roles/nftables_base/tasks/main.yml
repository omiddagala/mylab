---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Ensure nftables package is present
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Ensure nftables include directory exists
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure base include file exists
  ansible.builtin.copy:
    dest: /etc/nftables.d/00-base.nft
    owner: root
    group: root
    mode: "0644"
    content: |
      # placeholder include file managed by Ansible
  notify: Restart nftables

- name: Build nftables rule set
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: Restart nftables

- name: Ensure nftables is enabled
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started