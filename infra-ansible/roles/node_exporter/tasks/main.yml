---
- name: Create node exporter user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
    state: present

- name: Download node exporter archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_archive }}.tar.gz"
    dest: "/tmp/{{ node_exporter_archive }}.tar.gz"
    mode: '0644'

- name: Extract node exporter
  ansible.builtin.unarchive:
    src: "/tmp/{{ node_exporter_archive }}.tar.gz"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/{{ node_exporter_archive }}/node_exporter"

- name: Install node exporter binary
  ansible.builtin.copy:
    src: "/tmp/{{ node_exporter_archive }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  notify: Restart node exporter

- name: Install node exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node exporter

- name: Enable node exporter
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started
