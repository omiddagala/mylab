---
- name: Ensure node_exporter user exists
  ansible.builtin.user:
    name: "{{ mylab_node_exporter_user }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Download node exporter archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ mylab_node_exporter_version }}/node_exporter-{{ mylab_node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ mylab_node_exporter_version }}.tar.gz"
    mode: '0644'

- name: Unpack node exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ mylab_node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/node_exporter-{{ mylab_node_exporter_version }}.linux-amd64/node_exporter"

- name: Install node exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ mylab_node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

- name: Install node exporter service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      User={{ mylab_node_exporter_user }}
      Group={{ mylab_node_exporter_user }}
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=:{{ mylab_node_exporter_port }}
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Ensure node exporter is enabled
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started
