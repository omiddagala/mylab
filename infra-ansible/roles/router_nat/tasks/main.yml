---
- name: Ensure nftables include directory exists
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render router nftables NAT rules
  ansible.builtin.template:
    src: router-nat.nft.j2
    dest: /etc/nftables.d/router-nat.nft
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: restart nftables

- name: Ensure nftables service is enabled
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started