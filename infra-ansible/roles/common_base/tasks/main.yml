---
- name: Ensure machine-id exists
  ansible.builtin.command: systemd-machine-id-setup
  args:
    creates: /etc/machine-id

- name: Remove conflicting packages
  ansible.builtin.apt:
    name: "{{ common_remove_packages }}"
    state: absent
    purge: true
    autoremove: true
  when: common_remove_packages | length > 0

- name: Ensure base directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/ansible/facts.d
    - /etc/systemd/system
    - /usr/local/lib/systemd/system

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
