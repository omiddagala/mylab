- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name: "{{ package_common }}"
    state: present

- name: Ensure ops group exists
  group:
    name: ops
    state: present

- name: Ensure ops user exists
  user:
    name: ops
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Configure passwordless sudo for ops
  copy:
    dest: /etc/sudoers.d/99-ops
    mode: '0440'
    content: |
      ops ALL=(ALL) NOPASSWD:ALL

- name: Install authorized keys for ops
  authorized_key:
    user: ops
    key: "{{ item }}"
    state: present
  loop: "{{ admin_ssh_pubkeys }}"

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"