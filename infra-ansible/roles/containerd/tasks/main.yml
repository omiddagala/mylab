---
- name: Ensure required kernel modules for containerd are configured
  ansible.builtin.copy:
    dest: /etc/modules-load.d/containerd.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter
  notify: Load containerd kernel modules

- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker apt GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    mode: '0644'
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable

- name: Install containerd
  ansible.builtin.apt:
    update_cache: true
    name:
      - containerd.io
    state: present

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Write containerd config
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/containerd/config.toml
    mode: '0644'
  notify: Restart containerd

- name: Ensure containerd is enabled
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started
