---
- name: Install containerd package
  ansible.builtin.apt:
    name: containerd
    state: present

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Generate default containerd config if missing
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_default_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') | regex_replace('sandbox_image = \".*?\"', 'sandbox_image = \\\"' ~ containerd_sandbox_image ~ '\\\"') }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart containerd

- name: Enable containerd
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started
