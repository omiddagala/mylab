---
- name: Install bastion packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - tmux
      - mosh
    state: present

- name: Configure fail2ban
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    mode: '0644'
    content: |
      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      maxretry = 5
      bantime = 1h
      findtime = 10m
  when: bastion_fail2ban_enabled
  notify: Restart fail2ban

- name: Configure motd
  ansible.builtin.copy:
    dest: /etc/motd
    mode: '0644'
    content: |
      Authorized bastion host for mylab.
      All access is logged.
  when: bastion_enable_motd
