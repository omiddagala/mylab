---
- name: Install bastion packages
  ansible.builtin.apt:
    name: "{{ bastion_extra_packages | default([]) }}"
    state: present
  when: (bastion_extra_packages | default([])) | length > 0

- name: Create ops workspace directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ansible
    group: ansible
    mode: '0750'
  loop:
    - /home/ansible/.ssh
    - /home/ansible/bin
    - /srv/mylab

- name: Install simple ssh config
  ansible.builtin.template:
    src: ssh_config.j2
    dest: /home/ansible/.ssh/config
    owner: ansible
    group: ansible
    mode: '0600'
