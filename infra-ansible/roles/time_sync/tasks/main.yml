---
- name: Set timezone
  community.general.timezone:
    name: "{{ lab_timezone }}"

- name: Configure chrony
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony

- name: Enable chrony
  ansible.builtin.service:
    name: chrony
    enabled: true
    state: started
